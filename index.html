<script>
    let balance = parseInt(localStorage.getItem('sevn_balance')) || 25;
    const balanceDisplay = document.getElementById('balance');
    const mineBtn = document.getElementById('mineBtn');
    const timerDisplay = document.getElementById('timer');
    const connectBtn = document.getElementById('connectBtn');

    // لێرە ئەم دزڤرینین کو ئەرێ پێشتر والێت هاتیە گرێدان؟
    if (localStorage.getItem('wallet_connected')) {
        connectBtn.disabled = true;
        mineBtn.disabled = false;
        timerDisplay.innerText = "Ready to mine!";
    }

    async function connectWallet() {
        if (window.solana && window.solana.isPhantom) {
            try {
                const res = await window.solana.connect();
                document.getElementById('walletAddr').innerText = "Wallet: " + res.publicKey.toString().slice(0, 6) + "...";
                localStorage.setItem('wallet_connected', 'true');
                connectBtn.disabled = true;
                mineBtn.disabled = false;
                timerDisplay.innerText = "Ready to mine!";
            } catch (err) {
                alert("Connection failed!");
            }
        } else {
            alert("Please use a browser with Phantom Wallet installed (e.g., Kiwi or Chrome)");
        }
    }

    function mine() {
        balance += 5;
        localStorage.setItem('sevn_balance', balance);
        balanceDisplay.innerText = "SEVN: " + balance;
        mineBtn.disabled = true;
        
        let timeLeft = 60; // دێ ٦٠ چرکا بیت بۆ تێستێ
        let interval = setInterval(() => {
            timerDisplay.innerText = `Next claim in: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                mineBtn.disabled = false;
                timerDisplay.innerText = "Ready to mine!";
            }
            timeLeft--;
        }, 1000);
    }
</script>
