    <script>
        // داتایێن مینینگێ
        let mineBtn = document.querySelector('.mine-btn');
        let timerDisplay = document.getElementById('timer');
        
        // دەمژمێرا داهاتی (بـ چرکە: 24 دەمژمێر = 86400 چرکە)
        let timeLeft = 86400; 

        function updateTimer() {
            let h = Math.floor(timeLeft / 3600);
            let m = Math.floor((timeLeft % 3600) / 60);
            let s = timeLeft % 60;
            
            timerDisplay.innerText = `Next claim in: ${h}h ${m}m ${s}s`;
            
            if (timeLeft <= 0) {
                clearInterval(interval);
                mineBtn.disabled = false;
                timerDisplay.innerText = "Ready to mine!";
            } else {
                timeLeft--;
            }
        }

        // دەستپێکرنا تایمەرێ هەر چرکەکێ
        let interval = setInterval(updateTimer, 1000);

        // فانکشنا کۆپیکرنا لینکی
        function copyLink() {
            let link = "https://t.me/SEVEN_Coin_2026_bot/SevenApp";
            navigator.clipboard.writeText(link);
            alert("Invite link copied!");
        }
    </script>
