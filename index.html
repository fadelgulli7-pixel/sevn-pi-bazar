<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>تێستا والێتێ و مینینگێ</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #00e5ff; padding: 20px; border-radius: 15px; margin: 10px; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; background: #00e5ff; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <h1>قۆناغا تێستکرنێ</h1>
    
    <div class="box">
        <div id="walletInfo">والێت نەهاتیە گرێدان</div>
        <button onclick="testWallet()">گرێدانا والێتێ تاقی بکە</button>
    </div>

    <div class="box">
        <div id="mineStatus">حازرە بۆ مینینگێ</div>
        <button onclick="testMining()">مینینگێ تاقی بکە</button>
    </div>

    <script>
        // تێستا گرێدانا والێتێ
        async function testWallet() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const res = await window.solana.connect();
                    document.getElementById('walletInfo').innerText = "والێت سەرکەفت: " + res.publicKey.toString().slice(0, 10) + "...";
                } catch (err) { alert("گرێدان سەرنەکەفت!"); }
            } else {
                alert("فانتۆم والێت نەهاتە دیتن! ل براوسەرێ تێلیگرامێ یان فانتۆم ڤەکە.");
            }
        }

        // تێستا لۆژیکا مینینگێ
        function testMining() {
            let current = parseFloat(document.getElementById('mineStatus').innerText) || 0;
            let newVal = current + 0.5;
            document.getElementById('mineStatus').innerText = newVal + " SEVN زێدەبوو!";
            alert("مینینگ کار دکەت! تە 0.5 SEVN وەرگرت.");
        }
    </script>
</body>
</html>
