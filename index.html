<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining Pro</title>
    <style>
        :root { --primary: #ff00ff; --secondary: #00e5ff; --dark: #050508; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; text-align: center; color: #fff; background: radial-gradient(circle at center, #1b2735 0%, #050508 100%); min-height: 100vh; overflow-x: hidden; }
        
        .wallet-card { background: linear-gradient(270deg, #7000ff, #00e5ff, #ff00ff); background-size: 600% 600%; animation: gradientShift 5s ease infinite; padding: 30px; border-radius: 25px; margin-bottom: 20px; }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .mine-btn { background: #222; border: 2px solid var(--secondary); padding: 20px 40px; color: var(--secondary); font-size: 20px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .mine-btn:active { transform: scale(0.9); }
        
        .particle { position: absolute; color: gold; font-size: 20px; pointer-events: none; animation: pop 0.8s ease-out forwards; }
        @keyframes pop { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        
        .leaderboard { margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    <div class="wallet-card">
        <div id="balance" style="font-size: 35px; font-weight: bold;">SEVN: 10.0</div>
        <div id="prediction" style="font-size: 14px; margin-top: 5px;">Est. Monthly: 15.0 SEVN</div>
    </div>

    <button class="mine-btn" id="mineBtn" onclick="mineCoins()">MINE 0.5 SEVN</button>

    <div class="leaderboard">
        <strong>Leaderboard:</strong><br>
        1. CryptoKing - 500 SEVN<br>
        2. MineMaster - 420 SEVN
    </div>

    <script>
        let balance = 10;
        function mineCoins() {
            // 1. ڤایبرەیشن
            if (navigator.vibrate) navigator.vibrate(200);

            // 2. بزاڤا پارتیکڵان (کوین)
            for(let i=0; i<3; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.innerText = '🪙';
                p.style.left = (Math.random() * 80 + 10) + '%';
                p.style.top = '60%';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }

            // 3. نویکرنا باڵانس و پێشبینی
            balance += 0.5;
            document.getElementById('balance').innerText = "SEVN: " + balance.toFixed(1);
            document.getElementById('prediction').innerText = "Est. Monthly: " + (balance * 30).toFixed(1) + " SEVN";
            
            alert("تە 0.5 SEVN ب دەست ڤە ئینان!");
        }
    </script>
</body>
</html>
