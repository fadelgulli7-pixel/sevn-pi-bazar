<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining Pro</title>
    <style>
        :root { --primary: #ff00ff; --secondary: #00e5ff; --dark: #050508; }
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; color: #fff; background-color: #050508; }
        .wallet-card { background: linear-gradient(135deg, #7000ff, #00e5ff); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .mine-btn { background: #222; border: 2px solid var(--primary); padding: 20px 80px; color: var(--primary); font-size: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .mine-btn:disabled { border: 2px solid #555; color: #555; cursor: not-allowed; }
        .stats-box, .leaderboard-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-top: 20px; color: #aaa; }
        .invite-btn { background: #00e5ff; color: #000; border: none; padding: 15px 60px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    <div class="wallet-card">
        <div style="font-size: 14px;">Current Balance</div>
        <div id="balance" style="font-size: 40px; font-weight: bold;">SEVN: 10.5</div>
    </div>

    <button class="mine-btn" id="mineBtn" onclick="mineCoins()">MINE 0.5 SEVN</button>
    <div id="timer" style="color: var(--primary); margin-top: 15px; font-weight: bold;">Ready to mine!</div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwthwv00YNK85eNwXCqovtjLs9CztYpsVu5-A81kPm2jmRhZTr_4Jkpq6o0nBPViSylA/exec';
        const mineBtn = document.getElementById('mineBtn');
        const timerDisplay = document.getElementById('timer');

        function mineCoins() {
            // 1. هنارتنا داتایان
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "User",
                    wallet: "Wallet",
                    amount: 0.5
                })
            });

            // 2. کێمکرنا دوگمێ
            mineBtn.disabled = true;
            alert("تە 0.5 SEVN ب دەست ڤە ئینان!");
            
            // 3. دەستپێکرنا تایمەرێ (بۆ ٢٤ دەمژمێران)
            startTimer(86400); 
        }

        function startTimer(duration) {
            let timer = duration;
            let interval = setInterval(() => {
                let h = Math.floor(timer / 3600);
                let m = Math.floor((timer % 3600) / 60);
                let s = timer % 60;
                timerDisplay.innerText = `Next claim in: ${h}h ${m}m ${s}s`;
                if (--timer < 0) {
                    clearInterval(interval);
                    mineBtn.disabled = false;
                    timerDisplay.innerText = "Ready to mine!";
                }
            }, 1000);
        }

        function copyLink() {
            navigator.clipboard.writeText("https://t.me/SEVEN_Coin_2026_bot/SevenApp");
            alert("Invite link copied!");
        }
    </script>
</body>
</html>
