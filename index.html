<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining Pro</title>
    <style>
        :root { --primary: #ff00ff; --secondary: #00e5ff; --dark: #050508; }
        body { margin: 0; padding: 20px; font-family: sans-serif; text-align: center; color: #fff; background-color: #050508; }
        
        /* The Blue Gradient Card */
        .wallet-card { 
            background: linear-gradient(135deg, #7000ff, #00e5ff);
            padding: 30px; border-radius: 20px; margin-bottom: 20px;
        }
        
        .mine-btn { 
            background: #222; border: 2px solid #333; padding: 20px 80px; 
            color: #555; font-size: 20px; border-radius: 15px; font-weight: bold;
        }
        
        /* Stats & Leaderboard styling */
        .stats-box, .leaderboard-box { 
            background: #111; border: 1px solid #333; padding: 20px; 
            border-radius: 15px; margin-top: 20px; color: #aaa;
        }
        
        .invite-btn { 
            background: #00e5ff; color: #000; border: none; padding: 15px 60px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    
    <div class="wallet-card">
        <div style="font-size: 14px;">Current Balance</div>
        <div id="balance" style="font-size: 40px; font-weight: bold;">SEVN: 10.5</div>
        <div id="prediction" style="font-size: 12px; margin-top: 5px;">Est. Monthly: 315.0 SEVN</div>
    </div>

    <button class="mine-btn" disabled>MINE 0.5 SEVN</button>
    <div id="timer" style="color: var(--primary); margin-top: 15px; font-weight: bold;">Next claim in: 23h 59m 33s</div>

    <div class="stats-box" style="display: flex; justify-content: space-around;">
        <div><div style="font-size: 18px; color: #fff;">12.4k</div><div style="font-size: 10px;">Active Miners</div></div>
        <div><div style="font-size: 18px; color: #fff;">0.5/h</div><div style="font-size: 10px;">Mining Rate</div></div>
    </div>

    <div class="leaderboard-box">
        🏆 <strong>Leaderboard:</strong><br>
        1. CryptoKing (500 SEVN) | 2. MineMaster (420 SEVN)
    </div>

    <button class="invite-btn" onclick="copyLink()">Copy Invite Link</button>

    <script>
        function copyLink() {
            navigator.clipboard.writeText("https://t.me/SEVEN_Coin_2026_bot/SevenApp");
            alert("Invite link copied!");
        }
    </script>
</body>
</html>
