<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <style>
        body { background: #0a0a12; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .wallet-card { background: linear-gradient(135deg, #7000ff, #00e5ff); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn { background: #222; border: 2px solid #00e5ff; padding: 15px 30px; color: #00e5ff; border-radius: 10px; cursor: pointer; margin: 10px; width: 80%; }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    <div class="wallet-card">
        <div id="walletAddr">Wallet Not Connected</div>
        <div id="balance" style="font-size: 30px; font-weight: bold;">SEVN: 25</div>
    </div>

    <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    <button class="btn" id="mineBtn" onclick="mine()" disabled>MINE 5 SEVN</button>
    <div id="timer" style="color: #ff00ff; margin-top: 10px;">Connect wallet to start</div>

    <script>
        let balance = parseInt(localStorage.getItem('sevn_balance')) || 25;
        const balanceDisplay = document.getElementById('balance');
        const mineBtn = document.getElementById('mineBtn');
        const timerDisplay = document.getElementById('timer');
        const connectBtn = document.getElementById('connectBtn');

        balanceDisplay.innerText = "SEVN: " + balance;

        async function connectWallet() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const res = await window.solana.connect();
                    document.getElementById('walletAddr').innerText = "Wallet: " + res.publicKey.toString().slice(0, 6) + "...";
                    connectBtn.disabled = true;
                    mineBtn.disabled = false;
                    timerDisplay.innerText = "Ready to mine!";
                } catch (err) { alert("Connection failed!"); }
            } else {
                alert("Please use Phantom Browser or Kiwi Browser!");
            }
        }

        function mine() {
            balance += 5;
            localStorage.setItem('sevn_balance', balance);
            balanceDisplay.innerText = "SEVN: " + balance;
            mineBtn.disabled = true;
            
            let timeLeft = 60; // بۆ تێستێ ٦٠ چرکا، تو دشێی بکەی 86400
            let interval = setInterval(() => {
                timerDisplay.innerText = `Next claim in: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    mineBtn.disabled = false;
                    timerDisplay.innerText = "Ready to mine!";
                }
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
