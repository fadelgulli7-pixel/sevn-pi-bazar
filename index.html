<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <style>
        body { background: #0a0a12; color: #00e5ff; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; }
        .coin-display { font-size: 30px; margin: 20px 0; border: 2px solid #7000ff; padding: 20px; border-radius: 15px; }
        .mine-btn { background: linear-gradient(45deg, #7000ff, #00e5ff); border: none; padding: 20px 40px; color: white; font-size: 20px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    <div class="coin-display">SEVN: <span id="balance">0</span></div>
    <button class="mine-btn" onclick="mine()">MINE SEVN</button>

    <script>
        let balance = 0;
        function mine() {
            balance += 1;
            document.getElementById('balance').innerText = balance;
        }
    </script>
</body>
</html>
