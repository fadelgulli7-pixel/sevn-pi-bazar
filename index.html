<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <style>
        :root {
            --primary: #ff00ff;
            --secondary: #00e5ff;
            --dark: #050508;
        }
        body { 
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif;
            text-align: center; color: #fff;
            background: radial-gradient(circle at center, #1b2735 0%, #050508 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: twinkle 5s infinite alternate; z-index: -1;
        }
        @keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }
        
        .wallet-card { 
            background: linear-gradient(270deg, #7000ff, #00e5ff, #ff00ff);
            background-size: 600% 600%;
            animation: gradientShift 5s ease infinite;
            padding: 30px; border-radius: 25px; margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .mine-btn { 
            background: linear-gradient(90deg, #222, #000); 
            border: 2px solid var(--secondary); 
            padding: 20px 50px; color: var(--secondary); 
            font-size: 20px; border-radius: 50px; 
            cursor: pointer; transition: 0.4s; font-weight: bold;
            text-transform: uppercase;
        }
        .mine-btn:hover { box-shadow: 0 0 20px var(--secondary); transform: scale(1.05); }
        .mine-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        /* پڕکرنا جهێ ڕەش بـ ستاتس */
        .footer-stats {
            margin-top: 30px; padding: 20px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 20px; border: 1px solid #333;
        }
        .invite-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .invite-btn { background: var(--secondary); color: #000; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    
    <div class="wallet-card">
        <div style="font-size: 16px; opacity: 0.8;">Current Balance</div>
        <div id="balance" style="font-size: 40px; font-weight: bold; text-shadow: 0 0 10px #000;">SEVN: 10.0</div>
    </div>

    <button class="mine-btn" id="mineBtn" onclick="mineCoins()">MINE 0.5 SEVN</button>
    <div id="timer" style="color: var(--primary); margin-top: 15px; font-weight: bold;">Ready to mine!</div>

    <div class="footer-stats">
        <p style="font-size: 12px; color: #aaa; margin-top:0;">Network Status: <span style="color: #00e5ff;">Live Active</span></p>
        <div style="display: flex; justify-content: space-around;">
            <div>
                <div style="font-size: 18px; font-weight: bold;">12.4k</div>
                <div style="font-size: 10px; color: #777;">Active Miners</div>
            </div>
            <div>
                <div style="font-size: 18px; font-weight: bold;">0.5/h</div>
                <div style="font-size: 10px; color: #777;">Mining Rate</div>
            </div>
        </div>
    </div>

    <div class="invite-section">
        <p>Invite a friend & get +3 SEVN bonus!</p>
        <button class="invite-btn" onclick="copyLink()">Copy Invite Link</button>
    </div>

    <script>
        let balance = 10;
        let timeLeft = 0; 
        const timerDisplay = document.getElementById('timer');
        const mineBtn = document.getElementById('mineBtn');
        const balanceDisplay = document.getElementById('balance');
        let interval;

        function updateTimer() {
            if (timeLeft > 0) {
                let h = Math.floor(timeLeft / 3600);
                let m = Math.floor((timeLeft % 3600) / 60);
                let s = timeLeft % 60;
                timerDisplay.innerText = `Next claim in: ${h}h ${m}m ${s}s`;
                timeLeft--;
            } else {
                clearInterval(interval);
                mineBtn.disabled = false;
                timerDisplay.innerText = "Ready to mine!";
            }
        }

        function mineCoins() {
            balance += 0.5;
            balanceDisplay.innerText = "SEVN: " + balance.toFixed(1);
            mineBtn.disabled = true;
            timeLeft = 86400; 
            interval = setInterval(updateTimer, 1000);
            alert("تە 0.5 SEVN ب دەست ڤە ئینان!");
        }

        function copyLink() {
            navigator.clipboard.writeText("https://t.me/SEVEN_Coin_2026_bot/SevenApp");
            alert("Invite link copied! (Bonus: 3 SEVN)");
        }
    </script>
</body>
</html>
