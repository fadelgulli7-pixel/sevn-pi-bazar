<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <style>
        body { 
            background: radial-gradient(circle, #1a1a2e, #0a0a12); 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            text-align: center; padding: 20px; margin: 0; min-height: 100vh;
        }
        h1 { color: #00e5ff; margin-bottom: 20px; text-shadow: 0 0 10px #00e5ff; }
        
        /* والێت ل سەرێ */
        .wallet-card { 
            background: linear-gradient(135deg, #7000ff, #00e5ff); 
            padding: 25px; border-radius: 20px; margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }
        .balance-text { font-size: 32px; font-weight: bold; }
        
        /* دوگمەیا ماینینگێ */
        .mine-btn { 
            background: #101020; border: 2px solid #00e5ff; 
            padding: 20px 50px; color: #00e5ff; font-size: 22px; 
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .mine-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        
        /* ئینڤایت ل خوارێ */
        .invite-section { margin-top: 50px; }
        .invite-btn { 
            background: #7000ff; border: none; padding: 12px 30px; 
            color: white; border-radius: 25px; cursor: pointer; font-size: 16px;
        }
        #timer { color: #ff00ff; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    
    <div class="wallet-card">
        <p style="margin:0; font-size: 14px; opacity: 0.8;">Current Balance</p>
        <div class="balance-text">SEVN: <span id="balance">10</span></div>
    </div>

    <button id="mineBtn" class="mine-btn" disabled>MINE 10 SEVN</button>
    <p id="timer">Next claim in: 23h 59m</p>

    <div class="invite-section">
        <button class="invite-btn" onclick="invite()">Invite Friends & Earn</button>
    </div>

    <script>
        function invite() {
            let inviteLink = "https://t.me/SEVEN_Coin_2026_bot/SevenApp";
            navigator.clipboard.writeText(inviteLink);
            alert("Invite link copied!");
        }
    </script>
</body>
</html>
