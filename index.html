<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining Pro</title>
    <style>
        :root { --primary: #00e5ff; }
        body { 
            margin: 0; padding: 20px; font-family: sans-serif; text-align: center; color: #fff;
            background-color: #050508;
            min-height: 100vh;
        }
        
        .container { max-width: 500px; margin: auto; padding-top: 20px; }

        /* وێنەیێ 7 ل ناڤەڕاستێ */
        .logo-img { 
            width: 150px; height: 150px; border-radius: 50%; 
            margin-bottom: 20px; border: 3px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
        }

        .wallet-card { 
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.6), rgba(0, 229, 255, 0.6));
            padding: 20px; border-radius: 25px; margin-bottom: 20px;
        }
        
        .mine-btn { 
            background: rgba(0, 0, 0, 0.8); 
            border: 2px solid var(--primary); padding: 15px 50px; 
            color: var(--primary); font-size: 18px; border-radius: 50px; 
            cursor: pointer; font-weight: bold;
        }
        
        .box { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #333; padding: 15px; 
            border-radius: 15px; margin-top: 15px; color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="67024.jpg" class="logo-img" alt="SEVEN Logo">
        
        <h1>SEVEN Mining</h1>
        
        <div class="wallet-card">
            <div style="font-size: 14px;">Current Balance</div>
            <div id="balance" style="font-size: 35px; font-weight: bold;">SEVN: 11.0</div>
        </div>

        <button class="mine-btn" onclick="mineCoins()">MINE 0.5 SEVN</button>
        <div id="timer" style="color: #ff00ff; margin-top: 10px;">Ready to mine!</div>

        <div class="box">
            <div><strong>12.4k</strong> Active Miners | <strong>0.5/h</strong> Rate</div>
        </div>

        <div class="box">
            🏆 <strong>Leaderboard:</strong><br>
            CryptoKing (500 SEVN)
        </div>
    </div>

    <script>
        function mineCoins() {
            alert("تە 0.5 SEVN ب دەست ڤە ئینان!");
        }
    </script>
</body>
</html>
