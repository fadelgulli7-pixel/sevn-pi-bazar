<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <style>
        body { 
            background: #0a0a12; color: #00e5ff; font-family: 'Segoe UI', sans-serif; 
            text-align: center; padding: 20px; margin: 0;
        }
        h1 { color: #7000ff; margin-bottom: 20px; }
        
        /* والێت ل سەرێ */
        .wallet-section { 
            border: 2px solid #7000ff; padding: 15px; border-radius: 15px; 
            background: rgba(112, 0, 255, 0.1); margin-bottom: 20px;
        }
        .balance-text { font-size: 28px; font-weight: bold; color: #fff; }
        
        /* دوگمەیا ماینینگێ */
        .mine-btn { 
            background: linear-gradient(45deg, #7000ff, #00e5ff); 
            border: none; padding: 15px 40px; color: white; font-size: 20px; 
            border-radius: 30px; cursor: pointer; margin: 10px 0;
        }
        .mine-btn:disabled { background: #333; color: #888; cursor: not-allowed; }
        
        /* سێکشنا ئینڤایتێ ل خوارێ */
        .invite-section { 
            margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;
        }
        .invite-btn { 
            background: transparent; border: 1px solid #00e5ff; padding: 8px 20px; 
            color: #00e5ff; border-radius: 20px; cursor: pointer; font-size: 14px;
        }
        #timer { color: #ff00ff; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    
    <div class="wallet-section">
        <p style="margin:0; font-size: 14px;">Current Balance</p>
        <div class="balance-text">SEVN: <span id="balance">10</span></div>
    </div>

    <button id="mineBtn" class="mine-btn" disabled>MINE 10 SEVN</button>
    <p id="timer">Next claim in: 23h 59m</p>

    <div class="invite-section">
        <p style="font-size: 14px; margin-bottom: 10px;">Invite Friends & Earn More!</p>
        <button class="invite-btn" onclick="invite()">Copy Invite Link</button>
    </div>

    <script>
        function invite() {
            let inviteLink = "https://t.me/SEVEN_Coin_2026_bot/SevenApp";
            navigator.clipboard.writeText(inviteLink);
            alert("Invite link copied!");
        }
    </script>
</body>
</html>
