<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        body { background: #0a0a12; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .wallet-card { background: linear-gradient(135deg, #7000ff, #00e5ff); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #fff; }
        .mine-btn { background: #222; border: 2px solid #00e5ff; padding: 15px 40px; color: #00e5ff; font-size: 18px; border-radius: 10px; cursor: pointer; }
        .invite-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .invite-btn { background: #00e5ff; color: #000; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    <div class="wallet-card">
        <div style="font-size: 14px;">Current Balance</div>
        <div style="font-size: 30px; font-weight: bold;">SEVN: 10</div>
    </div>

    <button class="mine-btn" disabled>MINE 5 SEVN</button>
    <div id="timer" style="color: #ff00ff; margin-top: 10px;">Next claim in: 23h 59m</div>

    <div class="invite-section">
        <p>Invite a friend & get +10 SEVN bonus!</p>
        <button class="invite-btn" onclick="copyLink()">Copy Invite Link</button>
    </div>

    <script>
        function copyLink() {
            let link = "https://t.me/SEVEN_Coin_2026_bot/SevenApp";
            navigator.clipboard.writeText(link);
            alert("Invite link copied! Share to earn 10 SEVN.");
        }
    </script>
</body>
</html>
