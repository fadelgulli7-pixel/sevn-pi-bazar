<script>
    let balance = localStorage.getItem('sevn_balance') ? parseInt(localStorage.getItem('sevn_balance')) : 10;
    const balanceDisplay = document.querySelector('.wallet-card div:last-child');
    const mineBtn = document.getElementById('mineBtn');

    // نیشاندانا کوینان
    balanceDisplay.innerText = "SEVN: " + balance;

    function mine() {
        balance += 5;
        localStorage.setItem('sevn_balance', balance);
        balanceDisplay.innerText = "SEVN: " + balance;
        
        // ئەڤە دێ دەمێ دووماهی ماینینگێ پاشەکەوت کەت
        localStorage.setItem('last_mine_time', Date.now());
        
        alert("تە 5 SEVN ب دەست ڤە ئینان!");
        mineBtn.disabled = true; // دوگمێ بێکار دکت
        startTimer(); // دەستپێکرنا تایمەری
    }

    function startTimer() {
        // لێرە تایمەرەکێ ٢٤ دەمژمێری دکت
        let timer = 24 * 60 * 60; 
        let interval = setInterval(() => {
            timer--;
            // لێرە تو دشێی تایمەری ل سەر شاشێ نیشان بدی
            if (timer <= 0) {
                clearInterval(interval);
                mineBtn.disabled = false;
            }
        }, 1000);
    }
</script>
