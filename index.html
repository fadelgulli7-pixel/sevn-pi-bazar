<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVEN Mining</title>
    <style>
        body { 
            background: #0a0a12; color: #00e5ff; font-family: 'Segoe UI', sans-serif; 
            text-align: center; padding: 20px; 
        }
        h1 { color: #7000ff; }
        .wallet-section, .invite-section { 
            border: 2px solid #7000ff; padding: 20px; border-radius: 20px; 
            background: rgba(112, 0, 255, 0.1); margin-bottom: 20px;
        }
        .balance-text { font-size: 30px; font-weight: bold; }
        .mine-btn { 
            background: linear-gradient(45deg, #7000ff, #00e5ff); 
            border: none; padding: 20px 50px; color: white; font-size: 22px; 
            border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .mine-btn:disabled { background: #333; color: #888; cursor: not-allowed; }
        #timer { margin-top: 15px; color: #ff00ff; font-size: 18px; }
        .invite-btn { 
            background: #7000ff; border: none; padding: 10px 20px; 
            color: white; border-radius: 10px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>SEVEN Mining</h1>
    
    <div class="wallet-section">
        <p>Current Balance</p>
        <div class="balance-text">SEVN: <span id="balance">10</span></div>
    </div>

    <button id="mineBtn" class="mine-btn" disabled>MINE 10 SEVN</button>
    <p id="timer">Next claim in: 23h 59m</p>

    <div class="invite-section">
        <p>Invite Friends & Earn More!</p>
        <button class="invite-btn" onclick="invite()">Copy Invite Link</button>
    </div>

    <script>
        // سیستەمێ رێفەرالێ (Invite)
        function invite() {
            let inviteLink = "https://t.me/SEVEN_Coin_2026_bot/SevenApp";
            navigator.clipboard.writeText(inviteLink);
            alert("Invite link copied: " + inviteLink);
        }
    </script>
</body>
</html>
